<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
    <linearGradient id="book" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>
    <linearGradient id="bread" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd34d"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Inner glow -->
  <rect width="512" height="512" rx="112" ry="112" fill="rgba(255,255,255,0.06)"/>

  <!-- Recipe book body -->
  <rect x="130" y="150" width="220" height="265" rx="14" fill="url(#book)" />

  <!-- Book spine -->
  <rect x="130" y="150" width="28" height="265" rx="8" fill="#d97706"/>

  <!-- Book lines (recipe text) -->
  <rect x="178" y="210" width="140" height="10" rx="5" fill="#f97316" opacity="0.5"/>
  <rect x="178" y="234" width="110" height="10" rx="5" fill="#f97316" opacity="0.4"/>
  <rect x="178" y="258" width="130" height="10" rx="5" fill="#f97316" opacity="0.4"/>
  <rect x="178" y="282" width="95"  height="10" rx="5" fill="#f97316" opacity="0.35"/>

  <!-- Divider line -->
  <rect x="178" y="308" width="140" height="2" rx="1" fill="#d97706" opacity="0.4"/>

  <!-- Second set of lines -->
  <rect x="178" y="326" width="120" height="10" rx="5" fill="#f97316" opacity="0.35"/>
  <rect x="178" y="350" width="100" height="10" rx="5" fill="#f97316" opacity="0.3"/>

  <!-- Bread loaf on top of book -->
  <ellipse cx="305" cy="192" rx="72" ry="42" fill="url(#bread)"/>
  <!-- Bread top crust shine -->
  <ellipse cx="295" cy="178" rx="38" ry="18" fill="rgba(255,255,255,0.18)" />
  <!-- Bread score lines -->
  <path d="M268 195 Q285 175 302 195" stroke="#b45309" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M295 198 Q312 178 329 198" stroke="#b45309" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Small wheat stalk left -->
  <line x1="148" y1="148" x2="148" y2="108" stroke="#fef3c7" stroke-width="4" stroke-linecap="round"/>
  <ellipse cx="148" cy="104" rx="7" ry="14" fill="#fef3c7" opacity="0.85" transform="rotate(-15 148 104)"/>
  <ellipse cx="140" cy="118" rx="6" ry="12" fill="#fef3c7" opacity="0.7" transform="rotate(-35 140 118)"/>
  <ellipse cx="156" cy="118" rx="6" ry="12" fill="#fef3c7" opacity="0.7" transform="rotate(35 156 118)"/>

  <!-- Small wheat stalk right -->
  <line x1="365" y1="148" x2="365" y2="108" stroke="#fef3c7" stroke-width="4" stroke-linecap="round"/>
  <ellipse cx="365" cy="104" rx="7" ry="14" fill="#fef3c7" opacity="0.85" transform="rotate(15 365 104)"/>
  <ellipse cx="357" cy="118" rx="6" ry="12" fill="#fef3c7" opacity="0.7" transform="rotate(-35 357 118)"/>
  <ellipse cx="373" cy="118" rx="6" ry="12" fill="#fef3c7" opacity="0.7" transform="rotate(35 373 118)"/>
</svg>
